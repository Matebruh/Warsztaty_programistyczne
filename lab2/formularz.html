<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <form action="rejestracja.php" method="post" enctype="multipart/form-data">
            <fieldset>
                <legend>Dane osobowe</legend>
                <ol>
                    <li>
                        <label for="firstname">Imię: </label>
                        <input type="text" id="firstname" name="firstname" required minlength="2" maxlength="50" placeholder="" autofocus>
                    </li>

                    <li>
                        <label for="lastname">Nazwisko: </label>
                        <input type="text" id="lastname" name="lastname" required maxlength="60">
                    </li>

                    <li>
                        <label for="email">Adres email:</label>
                        <input type="email" id="email" name="email" required multiple>
                    </li>
                    
                    <li>
                        <label for="phone">Numer telefonu: </label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{9}" placeholder="123456789">
                    </li>

                    <li>
                        <label for="birthdate">Data urodzenia: </label>
                        <input type="date" id="birthdate" name="birthdate" min="1900-01-01" max="2026-12-31">
                    </li>

                    <li>
                        <span>Płeć: </span>
                        <label><input type="radio" name="gender" value="kobieta"> Kobieta</label>
                        <label><input type="radio" name="gender" value="mezczyzna"> Mężczyzna</label>
                        <label><input type="radio" name="gender" value="inna"> Inna</label>
                    </li>

                    <li>
                        <label for="pesel">Numer PESEL: </label>
                        <input type="password" id="pesel" name="pesel" pattern="[0-9]{11}" autocomplete="off">
                    </li>
                </ol>
            </fieldset>

            <fieldset>
                <legend>Adres</legend>
                
                <label for="street">Ulica i numer: </label>
                <input type="text" id="street" required>
                
                <label for="zip_code">Kod pocztowy: </label>
                <input type="text" id="zip_code" pattern="[0-9]{2}-[0-9]{3}" placeholder="00-000">

                <label for="city_choice">Miasto: </label>
                <input id="city_choice" list="cities">
                <datalist id="cities">
                    <option value="Gdańsk"></option>
                    <option value="Warszawa"></option>
                    <option value="Białystok"></option>
                    <option value="Zakopane"></option>
                    <option value="Poznań"></option>
                    <option value="Kraków"></option>
                </datalist>

                <label for="countries"></label>
                <select name="countries" id="countries" required>
                    <optgroup label="Europa: ">
                        <option value="Polska" selected>Polska</option>
                        <option value="Szwecja">Szwecja</option>
                        <option value="Findlandia">Findlandia</option>
                        <option value="Austria">Austria</option>
                    </optgroup>

                    <optgroup label="Azja: ">
                        <option value="Chiny">Chiny</option>
                        <option value="Korea">Korea</option>
                        <option value="Thailandia">Thailandia</option>
                        <option value="Taiwan">Taiwan</option>
                    </optgroup>
                </select>
            </fieldset>
        </form>
    </body>
</html>
